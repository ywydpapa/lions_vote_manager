<!DOCTYPE html>
<html lang="ko">
<head>
    {% include '/common/header.html' %}
    <style>
        .table-schedule th {
            background-color: #f8f9fa;
            font-weight: 700;
            color: #495057;
            text-align: center;
            vertical-align: middle;
        }

        .table-schedule td {
            vertical-align: middle;
            text-align: center;
        }

        .table-schedule a:hover {
            text-decoration: underline !important;
        }

        /* 완료된 예약 붉은색 표시 */
        .status-done {
            color: #dc3545 !important; /* Bootstrap text-danger 색상 */
            font-weight: 700;
        }

        /* 도착한 예약 초록색 표시 */
        .status-arrive {
            color: #198754 !important; /* Bootstrap text-success 색상 (가독성을 위해 수정) */
            font-weight: 700;
        }

        /* 대기 중인 예약 검은색 표시 */
        .status-pending {
            color: #212529 !important;
            font-weight: 600;
        }
    </style>
</head>
<body class="d-flex flex-column h-100 bg-light">
<main class="flex-shrink-0">
    <!-- Navigation-->
    {% include '/common/topnav.html' %}

    <!-- Page Content-->
    <div class="container px-5 my-5">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bolder mb-0"><span class="text-gradient d-inline">스케줄 목록</span></h1>
        </div>
        <div class="row gx-5 justify-content-center">
            <div class="col-lg-12 col-xl-11">
                <div id="scheduleRoot"></div>
            </div>
        </div>
    </div>
</main>

<!-- Footer-->
{% include '/common/footer.html' %}
{% include '/common/adscript.html' %}

<script>
  const START_HOUR = 9;
  const END_HOUR = 19;
  const STEP_MIN = 30;

  const pad2 = (n) => String(n).padStart(2, '0');
  const ymd = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  const hm = (d) => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  const koDayTitle = (d) => `${d.getMonth()+1}월 ${d.getDate()}일`;

  function reservDtlUrl(reservNo) {
    const n = Number(reservNo);
    if (!Number.isFinite(n)) return '#';
    // 보좌관용 상세 페이지 경로
    return `/view_reservdtl_aide/${n}`;
  }

  function escapeHtml(s) {
    return String(s ?? '')
      .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
      .replaceAll('"','&quot;').replaceAll("'","&#039;");
  }

  function floorToStep(date, stepMin) {
    const d = new Date(date);
    const m = d.getMinutes();
    d.setMinutes(m - (m % stepMin), 0, 0);
    return d;
  }

  // === 화면을 그리는 메인 함수 ===
  function renderSchedule(reservsData) {
    const all = (reservsData ?? []).map(r => ({ ...r, _dt: new Date(r.reservFrom) }));

    // 오늘 날짜키
    const todayKey = ymd(new Date());
    let reservs = all.filter(r => ymd(r._dt) === todayKey);

    // 오늘 예약이 없으면 3월 10일로 대체
    if (reservs.length === 0) {
      const now = new Date();
      const march10 = new Date(now.getFullYear(), 2, 10); // 월은 0부터: 2 = 3월
      const march10Key = ymd(march10);
      reservs = all.filter(r => ymd(r._dt) === march10Key);
    }

    // 날짜별 그룹화
    const groups = new Map();
    for (const r of reservs) {
      const key = ymd(r._dt);
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(r);
    }

    const days = Array.from(groups.keys()).sort();
    const root = document.getElementById('scheduleRoot');

    if (days.length === 0) {
      root.innerHTML = `<div class="text-muted p-4 text-center bg-white rounded shadow-sm">예약이 없습니다.</div>`;
      return;
    }

    let html = `
      <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
        <div class="table-responsive">
          <table class="table table-bordered table-hover table-schedule mb-0" style="min-width: 800px;">
            <thead>
              <tr>
                <th style="width: 12%;">일자</th>
                <th style="width: 10%;">시간</th>
                <th style="width: 20%;">방문자 1</th>
                <th style="width: 20%;">방문자 2</th>
                <th style="width: 20%;">방문자 3</th>
                <th style="width: 18%;">비고</th>
              </tr>
            </thead>
            <tbody>
    `;

    for (const dayKey of days) {
      const dayDate = new Date(dayKey + 'T00:00:00');
      const list = groups.get(dayKey);

      // 오늘 날짜인지 판별
      const isToday = (dayKey === todayKey);
      const dateStr = isToday ? `오늘<br><small class="text-muted">(${koDayTitle(dayDate)})</small>` : koDayTitle(dayDate);

      const slotMap = new Map();
      for (const r of list) {
        const floored = floorToStep(r._dt, STEP_MIN);
        const slotKey = `${ymd(floored)} ${hm(floored)}`;
        if (!slotMap.has(slotKey)) slotMap.set(slotKey, []);
        slotMap.get(slotKey).push(r);
      }

      const start = new Date(dayKey + `T${pad2(START_HOUR)}:00:00`);
      const end   = new Date(dayKey + `T${pad2(END_HOUR)}:00:00`);

      const totalSlots = (end.getTime() - start.getTime()) / (STEP_MIN * 60000);
      let isFirstRowOfDay = true;

      for (let t = new Date(start); t < end; t = new Date(t.getTime() + STEP_MIN * 60000)) {
        const key = `${ymd(t)} ${hm(t)}`;
        const items = slotMap.get(key) ?? [];

        html += `<tr>`;

        // 일자 (하루의 첫 번째 줄에만 rowspan 적용)
        if (isFirstRowOfDay) {
          html += `<td rowspan="${totalSlots}" class="bg-light fw-bold">${dateStr}</td>`;
          isFirstRowOfDay = false;
        }

        // 시간
        html += `<td class="fw-bold text-secondary font-monospace">${hm(t)}</td>`;

        // 방문자 1, 2, 3 처리 로직
        for (let i = 0; i < 3; i++) {
          if (items[i]) {
            const r = items[i];

            // API 응답은 status, Jinja 응답은 attrib를 사용하므로 둘 다 체크하여 호환성 유지
            const status = r.status || r.attrib;

            // 상태에 따른 클래스 부여
            let textClass = 'status-pending'; // 기본 대기(검은색)
            if (status === '1DONE1DONE') {
              textClass = 'status-done';      // 완료(붉은색)
            } else if (status === '1111111111') {
              textClass = 'status-arrive';    // 도착(초록색)
            }

            html += `
              <td>
                <a href="${reservDtlUrl(r.reservNo)}" class="text-decoration-none ${textClass} d-block">
                  ${escapeHtml(r.visitorName)}
                  <span class="text-muted small fw-normal ms-1">(${r.visitCnt}명)</span>
                </a>
              </td>
            `;
          } else {
            html += `<td></td>`; // 빈 칸
          }
        }

        // 비고 (동시간대 예약들의 메모를 콤마로 연결)
        const memos = items.map(r => r.reservMemo).filter(m => m && m.trim() !== '').join(', ');
        html += `<td class="text-muted small text-start">${escapeHtml(memos)}</td>`;

        html += `</tr>`;
      }
    }

    html += `
            </tbody>
          </table>
        </div>
      </div>
    `;
    root.innerHTML = html;
  }

  // === 1. 처음 페이지 로드 시 Jinja2로 넘겨받은 데이터로 즉시 렌더링 (깜빡임 방지) ===
  const initialPayload = {{ reservs | tojson }};
  renderSchedule(initialPayload);

  // === 2. AJAX로 최신 데이터를 가져오는 함수 ===
  async function fetchLatestSchedule() {
    try {
      const response = await fetch('/api/get_reserv');
      if (response.ok) {
        const data = await response.json();
        // 성공적으로 가져오면 화면 다시 그리기
        renderSchedule(data.reservs);
      }
    } catch (error) {
      console.error("스케줄 데이터를 불러오는 중 오류 발생:", error);
    }
  }

  // === 3. 15초(15000ms)마다 백그라운드에서 갱신 (Polling) ===
  setInterval(fetchLatestSchedule, 15000);

  // === 4. 브라우저 뒤로가기로 돌아왔을 때 최신화 ===
  window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
      fetchLatestSchedule();
    }
  });

</script>
</body>
</html>
