<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>방명록 A4</title>
    <style>
        /* ---- Print setup ---- */
        @page {
            size: A4;
            margin: 0; /* 브라우저 기본 여백은 0으로 유지 */
        }

        @media print {
            .no-print {
                display: none !important;
            }
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        /* ---- Page ---- */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: "Noto Sans KR", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        }

        .page {
            box-sizing: border-box;
            width: 210mm;
            height: 297mm;
            margin: 0 auto;
            /* 프린터 여백으로 인해 잘리는 것을 방지하기 위해 4방향 3mm 패딩 추가 */
            padding: 3mm; 
            background: #fff;
        }

        .sheet {
            height: 100%;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ---- Header photo ---- */
        .photo {
            flex: 0 0 50%; /* 변경됨: 1장일 때도 무조건 A4 용지의 절반(50%)만 차지하도록 고정 */
            overflow: hidden;
            border: none;
            border-radius: 0;
            background: #f3f4f6;
            display: flex;
            position: relative;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ---- 추가: 사진 하단 문구 스타일 ---- */
        .phrase-overlay {
            position: absolute;
            bottom: 12mm;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.35);
            padding: 4mm 10mm;
            border-radius: 8px;
            font-size: 16pt;
            font-weight: 800;
            color: #111827;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            white-space: pre-line;
            z-index: 10;
        }

        /* ---- Top utility ---- */
        .toolbar {
            width: 210mm;
            margin: 10px auto;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn {
            border: 1px solid #d1d5db;
            background: #fff;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="toolbar no-print">
    <button class="btn" onclick="window.print()">인쇄하기</button>
</div>
<main class="page">
    <section class="sheet">
        <!-- 백엔드에서 넘겨준 photo_data (url과 phrase 포함) 반복 -->
        {% for item in photo_data %}
        <div class="photo">
            <img src="{{ item.url }}" alt="행사 사진 {{ loop.index }}">

            <!-- 문구가 입력된 경우에만 출력 -->
            {% if item.phrase %}
            <div class="phrase-overlay">{{ item.phrase }}</div>
            {% endif %}
        </div>
        {% endfor %}
    </section>
</main>
</body>
</html>
