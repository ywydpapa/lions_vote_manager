<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>방명록 A4</title>
    <style>
        /* ---- Print setup ---- */
        @page {
            size: A4;
            margin: 12mm;
        }

        @media print {
            .no-print {
                display: none !important;
            }
        }

        /* ---- Page ---- */
        :root {
            --ink: #111827;
            --muted: #6b7280;
            --line: #d1d5db;
            --soft: #f3f4f6;
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: "Noto Sans KR", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
            color: var(--ink);
            background: #fff;
        }

        .page {
            box-sizing: border-box;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 0;
        }

        .sheet {
            height: calc(297mm - 24mm);
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10mm;
        }

        /* ---- Header photo ---- */
        .photo {
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
            flex: 1; /* 변경됨: 고정 높이(90mm)를 없애고 남은 공간을 꽉 채우도록 설정 */
            background: var(--soft);
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 사진이 영역에 꽉 차게 (비율 유지, 넘치는 부분 잘림) */
            display: block;
        }

        /* ---- Title ---- */
        .title {
            text-align: center;
            padding: 2mm 2mm 0;
        }

        .title h1 {
            margin: 0;
            font-size: 18pt;
            letter-spacing: 0.2px;
            font-weight: 800;
        }

        .subtitle {
            margin-top: 2mm;
            font-size: 10.5pt;
            color: var(--muted);
        }

        /* ---- Info row ---- */
        .meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6mm;
            margin-top: 2mm;
        }

        .field {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 4mm 5mm;
            display: grid;
            grid-template-columns: 28mm 1fr;
            align-items: center;
            min-height: 14mm;
        }

        .label {
            font-size: 10.5pt;
            color: var(--muted);
            font-weight: 700;
        }

        .value {
            border-bottom: 1px solid var(--line);
            height: 8mm;
        }

        /* ---- Main message ---- */
        .content {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 6mm;
            flex: 1;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 4mm;
        }

        .content h2 {
            margin: 0;
            font-size: 12.5pt;
            letter-spacing: 0.1px;
        }

        .lines {
            border-radius: 10px;
            background: linear-gradient(#fff, #fff) padding-box,
            repeating-linear-gradient(
                    to bottom,
                    transparent 0,
                    transparent 9mm,
                    rgba(17, 24, 39, 0.12) 9mm,
                    rgba(17, 24, 39, 0.12) 9.2mm
            ) border-box;
            border: 1px solid rgba(17, 24, 39, 0.08);
            height: 100%;
            padding: 4mm;
        }

        .hint {
            font-size: 10pt;
            color: var(--muted);
            margin: 0;
        }

        /* ---- Footer ---- */
        .footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6mm;
            align-items: end;
        }

        .sign {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 4mm 5mm;
            min-height: 18mm;
            display: grid;
            grid-template-columns: 28mm 1fr;
            gap: 4mm;
            align-items: center;
        }

        .sign .value {
            height: 10mm;
        }

        .stamp {
            border: 1px dashed var(--line);
            border-radius: 10px;
            min-height: 18mm;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 10pt;
        }

        /* ---- Top utility ---- */
        .toolbar {
            width: 210mm;
            margin: 10px auto;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn {
            border: 1px solid var(--line);
            background: #fff;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
<div class="toolbar no-print">
    <button class="btn" onclick="window.print()">인쇄하기</button>
</div>
<main class="page">
    <section class="sheet">
        <!-- 사진 개수만큼 영역이 생성되어 A4 용지를 균등하게 채웁니다 -->
        {% for url in photo_urls %}
        <div class="photo">
            <img src="{{ url }}" alt="행사 사진 {{ loop.index }}">
        </div>
        {% endfor %}

        <footer class="footer">
        </footer>
    </section>
</main>
</body>
</html>
