<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>방명록 A4</title>
    <style>
        /* ---- Print setup ---- */
        @page {
            size: A4;
            margin: 0; /* 용지 전체 여백 제거 */
        }

        @media print {
            .no-print {
                display: none !important;
            }
            /* 배경색/이미지 인쇄 강제 적용 */
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        /* ---- Page ---- */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: "Noto Sans KR", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        }

        .page {
            box-sizing: border-box;
            width: 210mm;
            height: 297mm; /* A4 세로 길이에 딱 맞춤 */
            margin: 0 auto;
            padding: 0;
            background: #fff;
        }

        .sheet {
            height: 100%; /* page 높이(297mm)를 꽉 채움 */
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0; /* 사진 사이의 틈 제거 */
        }

        /* ---- Header photo ---- */
        .photo {
            flex: 1; /* 위아래 공간을 정확히 1:1로 분할 */
            overflow: hidden;
            /* 테두리와 둥근 모서리를 없애서 두 장이 완벽히 붙게 함 */
            border: none;
            border-radius: 0;
            background: #f3f4f6;
            display: flex;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 비율을 유지하면서 영역을 꽉 채움 (넘치는 부분은 잘림) */
            display: block;
        }

        /* ---- Top utility ---- */
        .toolbar {
            width: 210mm;
            margin: 10px auto;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn {
            border: 1px solid #d1d5db;
            background: #fff;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
<div class="toolbar no-print">
    <button class="btn" onclick="window.print()">인쇄하기</button>
</div>
<main class="page">
    <section class="sheet">
        <!-- 사진 개수만큼 영역이 생성되어 A4 용지를 균등하게 채웁니다 -->
        {% for url in photo_urls %}
        <div class="photo">
            <img src="{{ url }}" alt="행사 사진 {{ loop.index }}">
        </div>
        {% endfor %}
    </section>
</main>
</body>
</html>
