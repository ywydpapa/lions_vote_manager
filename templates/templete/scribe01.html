<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>방명록 A4</title>
    <style>
        /* ---- Print setup ---- */
        @page {
            size: A4;
            margin: 0;
        }

        @media print {
            .no-print {
                display: none !important;
            }
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        /* ---- Page ---- */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: "Noto Sans KR", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        }

        .page {
            box-sizing: border-box;
            width: 210mm;
            height: 297mm;
            margin: 0 auto;
            padding: 3mm; /* 프린터 여백 방지 */
            background: #fff;
        }

        .sheet {
            height: 100%;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ---- Header photo ---- */
        .photo {
            flex: 0 0 50%;
            overflow: hidden;
            border: none;
            border-radius: 0;
            background: #f3f4f6;
            display: flex;
            position: relative;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ---- 사진 하단 문구 스타일 (수정됨) ---- */
        .phrase-overlay {
            position: absolute;
            bottom: 10mm; /* 하단 여백 살짝 줄임 */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.35);
            padding: 3mm 8mm; /* 박스 위아래 뚱뚱해지는 것 방지 */
            border-radius: 8px;
            font-size: 15pt; /* 한 줄에 안전하게 들어가도록 폰트 크기 미세 조정 */
            font-weight: 800;
            color: #111827;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);

            /* 핵심 포인트: 자동 줄바꿈을 막고, 엔터(\n) 친 곳에서만 딱 1번 줄바꿈되도록 설정 */
            white-space: pre;
            line-height: 1.3; /* 두 줄 사이의 간격을 좁혀서 높이를 줄임 */
            z-index: 10;
        }

        /* ---- Top utility ---- */
        .toolbar {
            width: 210mm;
            margin: 10px auto;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn {
            border: 1px solid #d1d5db;
            background: #fff;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="toolbar no-print">
    <button class="btn" onclick="window.print()">인쇄하기</button>
</div>
<main class="page">
    <section class="sheet">
        <!-- 백엔드에서 넘겨준 photo_data (url과 phrase 포함) 반복 -->
        {% for item in photo_data %}
        <div class="photo">
            <img src="{{ item.url }}" alt="행사 사진 {{ loop.index }}">

            <!-- 문구가 입력된 경우에만 출력 -->
            {% if item.phrase %}
            <div class="phrase-overlay">{{ item.phrase }}</div>
            {% endif %}
        </div>
        {% endfor %}
    </section>
</main>
</body>
</html>
