<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>방명록 A4</title>
    <style>
        @page {
            size: A4;
            margin: 0;
        }

        @media print {
            .no-print {
                display: none !important;
            }
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: "Noto Sans KR", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        }

        .page {
            box-sizing: border-box;
            width: 210mm;
            height: 297mm;
            margin: 0 auto;
            padding: 3mm;
            background: #fff;
        }

        .sheet {
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 6mm;
        }

        /* 각 사진이 들어가는 절반 영역 */
        .photo-slot {
            flex: 0 0 calc(50% - 3mm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 실제 사진 박스: 기존 꽉찬 기준에서 약 25% 축소 */
        .photo {
            width: 75%;
            height: 75%;
            overflow: hidden;
            background: #f3f4f6;
            display: flex;
            position: relative;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .phrase-overlay {
            position: absolute;
            bottom: 10mm;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.35);
            padding: 3mm 8mm;
            border-radius: 8px;
            font-size: 15pt;
            font-weight: 800;
            color: #111827;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            white-space: pre;
            line-height: 1.3;
            z-index: 10;
        }

        .toolbar {
            width: 210mm;
            margin: 10px auto;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn {
            border: 1px solid #d1d5db;
            background: #fff;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="toolbar no-print">
    <button class="btn" onclick="window.print()">인쇄하기</button>
</div>

<main class="page">
    <section class="sheet">
        {% for item in photo_data %}
        <div class="photo-slot">
            <div class="photo">
                <img src="{{ item.url }}" alt="행사 사진 {{ loop.index }}">
                {% if item.phrase %}
                <div class="phrase-overlay">{{ item.phrase }}</div>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </section>
</main>
</body>
</html>
