<!DOCTYPE html>
<html lang="en">
    <head>
        {% include '/common/header.html' %}
        <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <style>
        #editor-container {
            height: 300px;
        }
    </style>
    </head>
    <body class="d-flex flex-column h-100 bg-light">
        <main class="flex-shrink-0">
            <!-- Navigation-->
            {% include '/common/topnav.html' %}
            <!-- Page Content-->
            <div class="container px-5 my-5">
                <div class="text-center mb-5">
                    <h1 class="display-5 fw-bolder mb-0"><span class="text-gradient d-inline">문서작성</span></h1>
                </div>
                <div class="row gx-5 justify-content-center">
                    <div class="col-lg-11 col-xl-9 col-xxl-8">
                        <form method="POST" id="editor-form" action="/insert_note">
                            <table class="table table-bordered text-center">
                                <thead>
                                </thead>
                                <tbody>
                                <tr>
                                    <td> 제목</td>
                                    <td><input class="form-control" id="dtitle" name="dtitle" type="text" required>
                                        <input class="form-control" id="ntype" name="ntype" type="text" value="{{ntype}}" hidden required>
                                    </td>
                                </tr>
                                <tr>
                                    <td> 내용</td>
                                    <td>
                                        <div id="editor-container" name="dcontent"></div>
                                        <input type="hidden" name="dcontent" id="dcontent" required></td>
                                </tr>
                                <tr>
                                    <td colspan="2">
                                        <div class="col-12"
                                             style="display: flex; justify-content: space-between; gap: 10px;">
                                            <a href="#" onclick="window.location.href='/'; return false;"
                                               class="btn btn-dark"
                                               role="button" style="flex: 0 0 30%;">목록으로 돌아가기</a>
                                            <button type="submit" class="btn btn-primary" style="flex: 0 0 50%;">저장
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <!-- Footer-->
        {% include '/common/footer.html' %}
        {% include '/common/adscript.html' %}
    </body>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
    const quill = new Quill('#editor-container', {theme: 'snow'});
    document.getElementById('editor-form').addEventListener('submit', async (event) => {
        event.preventDefault();

        document.getElementById('dcontent').value = quill.root.innerHTML;

        const form = event.target;
        const formData = new FormData(form);

        try {
            const response = await fetch(form.action, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            if (response.ok) {
                // ✅ 성공 시 알림 띄우고 지정된 URL로 이동
                alert(result.message);
                window.location.href = result.redirect_url;
            } else {
                // 실패 시 에러 메시지
                alert(result.message || "저장 실패");
            }
        } catch (error) {
            alert("알 수 없는 오류가 발생했습니다.");
            console.error(error);
        }
    });
</script>

</html>
