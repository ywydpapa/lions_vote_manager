<!DOCTYPE html>
<html lang="en">
<head>
    {% include '/common/header.html' %}
    <style>
        .cards-wrap {
            padding-top: 5vh;
            padding-bottom: 5vh;
        }

        .card-link {
            text-decoration: none;
            border: 0;
            border-radius: 1rem;
            background: #fff;
            box-shadow: 0 .5rem 1.25rem rgba(0, 0, 0, .08);
            min-height: clamp(120px, 20vh, 200px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* 마우스를 올렸을 때 버튼이 살짝 떠오르는 효과 추가 */
        .card-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 1rem 2rem rgba(0, 0, 0, .15);
        }

        /* 글자 크기가 화면에 맞춰 자동 조절되도록 설정 */
        .card-title-text {
            font-size: clamp(1.2rem, 2vw, 1.75rem);
            margin: 0;
            font-weight: 700;
            color: #212529;
        }

        /* 반으로 쪼개진 버튼용 작은 글씨 */
        .card-title-text-sm {
            font-size: clamp(1rem, 1.5vw, 1.3rem);
            margin: 0;
            font-weight: 700;
            color: #212529;
        }
    </style>
</head>
<body class="d-flex flex-column h-100 bg-light">
<main class="flex-shrink-0">
    <!-- Navigation-->
    {% include '/common/topnav.html' %}
    <!-- Page Content-->
    <div class="container px-5 my-5">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bolder mb-0"><span class="text-gradient d-inline">기초자료 관리</span></h1>
        </div>
        <div class="row gx-5 justify-content-center">
            <div class="col-lg-11 col-xl-10 col-xxl-9">
                <div class="cards-wrap">

                    <!-- [상단] 3개의 버튼 영역 -->
                    <div class="row row-cols-1 row-cols-md-3 g-4 mb-5">
                        <div class="col">
                            <a class="card card-link h-100" href="/manage_cmembers">
                                <div class="card-body d-flex align-items-center justify-content-center text-center">
                                    <h2 class="card-title-text">클럽회원등록</h2>
                                </div>
                            </a>
                        </div>
                        <div class="col">
                            <a class="card card-link h-100" href="/manage_clubs">
                                <div class="card-body d-flex align-items-center justify-content-center text-center">
                                    <h2 class="card-title-text">클럽정보</h2>
                                </div>
                            </a>
                        </div>

                        <!-- [수정됨] 사진 관리 / 사진 전송 반반 분할 영역 -->
                        <!-- col에 d-flex를 주어 내부 div가 무조건 부모 높이를 100% 꽉 채우도록 강제합니다. -->
                        <div class="col d-flex">
                            <!-- gap: 1.5rem을 주어 부트스트랩의 g-4 간격과 완벽하게 똑같은 여백을 만듭니다. -->
                            <div class="d-flex flex-column w-100" style="gap: 1.5rem;">
                                <!-- style="min-height: 0;"를 주어 기존의 큰 높이 제한을 무력화시킵니다. -->
                                <a class="card card-link flex-fill m-0" style="min-height: 0;" href="/manage_ephoto">
                                    <div class="card-body d-flex align-items-center justify-content-center text-center p-3">
                                        <h2 class="card-title-text-sm">사진 관리</h2>
                                    </div>
                                </a>
                                <a class="card card-link flex-fill m-0" style="min-height: 0;" href="/upload_ephoto">
                                    <div class="card-body d-flex align-items-center justify-content-center text-center p-3">
                                        <h2 class="card-title-text-sm">사진 전송</h2>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- [하단] 2개의 버튼 영역 -->
                    <div class="row row-cols-1 row-cols-md-2 g-4 justify-content-center">
                        <div class="col">
                            <a class="card card-link h-100" href="/notelist_candi">
                                <div class="card-body d-flex align-items-center justify-content-center text-center">
                                    <h2 class="card-title-text">후보자용 인사말</h2>
                                </div>
                            </a>
                        </div>
                        <div class="col">
                            <a class="card card-link h-100" href="/notelist_aide">
                                <div class="card-body d-flex align-items-center justify-content-center text-center">
                                    <h2 class="card-title-text">보좌관용 시나리오</h2>
                                </div>
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</main>
<!-- Footer-->
{% include '/common/footer.html' %}
{% include '/common/adscript.html' %}
</body>
</html>
