<!DOCTYPE html>
<html lang="en">
    <head>
        {% include '/common/header.html' %}
        <style>
  #popup-overlay{
    display:none;
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
  }

  #popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%);
    z-index: 1000;

    /* 비율 기반 크기 */
    width: 50vw;     /* 가로 비율 */
    height: 50vh;    /* 세로 비율 */

    background:#fff;
    border:1px solid #ccc;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    box-sizing: border-box;
    overflow: hidden;
  }

  /* 닫기 버튼 영역을 고정 높이로 만들고 iframe 높이를 계산 */
  #popup-header{
    height: 44px;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding: 6px 10px;
    border-bottom: 1px solid #eee;
    box-sizing: border-box;
    background: #fff;
  }

  #popup-close{
    background:#dc3545;
    color:#fff;
    border:none;
    padding:6px 10px;
    cursor:pointer;
  }

  #popup iframe{
    width:100%;
    height: calc(100% - 44px);
    border:0;
    display:block;
  }
</style>

    <style>
        #imagePreview {
            display: none; /* 기본적으로 숨김 */
            max-width: 200px; /* 최대 너비 설정 */
            max-height: 250px; /* 최대 높이 설정 */
            margin-top: 10px;
        }

        .image-container {
            display: flex; /* 이미지들을 가로로 배치 */
            justify-content: center; /* 가로 정렬 */
            align-items: center; /* 세로 정렬 */
            gap: 20px; /* 이미지 간격 */
        }
    </style>
    </head>
    <body class="d-flex flex-column h-100 bg-light">
        <main class="flex-shrink-0">
            <!-- Navigation-->
            {% include '/common/topnav.html' %}
            <!-- Page Content-->
            <div class="container px-5 my-5">
                <div class="text-center mb-5">
                    <h1 class="display-5 fw-bolder mb-0"><span class="text-gradient d-inline">회원 정보 수정 </span></h1>
                </div>
                <div class="row gx-5 justify-content-center">
                    <div class="col-lg-11 col-xl-9 col-xxl-8">
                        <table class="table table-bordered text-center">
                            <thead>
                            </thead>
                            <tbody>
                                 <tr>
                                <td style="text-align: center; vertical-align: middle">회원 사진</td>
                                <td style="text-align: center">
                                    <div class="image-container">
                                        <img src="/static/img/members/mphoto_{{memberdtl[0]}}.png" onerror="this.src='/static/img/defaultphoto.png'" alt="Member Image">
                                        <img id="imagePreview" alt="Image Preview">
                                    </div>
                                </td>
                                </tr>
                                <tr>
                                <td>사진 변경</td>
                                <td>
                                    <form action="/uploadmphoto/{{memberdtl[0]}}" method="post" enctype="multipart/form-data">
                                        <input type="file" name="file" accept="image/*" required
                                               onchange="displayFileInfo(this)">
                                        <span id="fileSize"></span>
                                        <input type="submit" value="회원사진 Upload"></form>
                                </td>
                                </tr>
                            </tbody>
                        </table>
                        <form method="POST" id="editor-form" action="/member_update/{{ memberdtl[0] }}">
                        <table class="table table-bordered text-center">
                            <thead>
                            </thead>
                            <tbody>
                                <tr>
                                    <td> 회원명 </td>
                                    <td><input class="form-control" id="membername" name="membername" type="text" required value="{{memberdtl[1]}}"></td>
                                </tr>
                                <tr>
                                    <td> 직책 </td>
                                    <td><select class="form-control selectpicker" data-live-search ="true" id="memberrank" name="memberrank">
                                        {% for rnk in ranks %}
                                        <option value="{{ rnk[0] }}" {% if rnk[0]|int== memberdtl[2]|int %} selected {% endif %}>{{ rnk[1] }}</option>
                                        {% endfor %}
                                    </select></td>
                                </tr>
                                <tr>
                                    <td> 소속클럽 </td>
                                    <td>
                                        <select class="form-control selectpicker" data-live-search="true" id="memberclub" name="memberclub" required>
                                            <option value="">클럽선택</option>
                                                {% for sp in clubs %}
                                                {% if sp.clubNo|int != 0 %}
                                                       <option value="{{ sp.clubNo }}" {% if sp.clubNo|int == memberdtl[3]|int %}selected{% endif %}>{{ sp.clubName }}</option>
                                                {% endif %}
                                                {% endfor %}
                                        </select>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="2">
                                        <div class="col-12"
                                             style="display: flex; justify-content: space-between; gap: 10px;">
                                            <a href="#" onclick="window.location.href='/manage_cmembers?clubno={{ memberdtl[3] }}'; return false;"
                                                class="btn btn-dark" role="button" style="flex: 0 0 30%;">회원 목록으로 돌아가기</a>
                                            <button type="submit" class="btn btn-primary" style="flex: 0 0 50%;">회원 정보 수정
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <!-- Footer-->
        {% include '/common/footer.html' %}
        {% include '/common/adscript.html' %}
        <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/js/bootstrap-select.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/css/bootstrap-select.min.css">

        <script>
    $(document).ready(function () {
        // selectpicker 초기화
        $('.selectpicker').selectpicker({
            style: 'btn-inverse',
            size: 20
        });

        // 폼 제출 이벤트 가로채기
        $('#editor-form').on('submit', async function(event) {
            event.preventDefault();
            const form = this;
            const formData = new FormData(form);
            const urlEncodedData = new URLSearchParams(formData).toString();
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded', // 명시적 헤더 추가
                    },
                    body: urlEncodedData // 변환한 데이터 전송
                });
                if (response.ok) {
                    const result = await response.json();
                    alert(result.message);

                    if (result.redirect_url) {
                        window.location.href = result.redirect_url;
                    } else {
                        window.history.back();
                    }
                } else {
                    alert("서버 오류가 발생했습니다. 다시 시도해주세요.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("알 수 없는 오류가 발생했습니다.");
            }
        });
    });

    function displayFileInfo(input) {
        const file = input.files[0];
        const fileSizeElement = document.getElementById("fileSize");
        const previewElement = document.getElementById("imagePreview");
        if (file) {
            const sizeInMB = (file.size / (1024 * 1024)).toFixed(2);
            fileSizeElement.textContent = `Selected file size: ${sizeInMB} MB`;
            const reader = new FileReader();
            reader.onload = function (e) {
                previewElement.src = e.target.result;
                previewElement.style.display = "block";
            };
            reader.readAsDataURL(file);
        } else {
            fileSizeElement.textContent = "";
            previewElement.style.display = "none";
        }
    }
</script>
    </body>
</html>
