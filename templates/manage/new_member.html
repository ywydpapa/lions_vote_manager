<!DOCTYPE html>
<html lang="en">
    <head>
        {% include '/common/header.html' %}
    </head>
    <body class="d-flex flex-column h-100 bg-light">
        <main class="flex-shrink-0">
            <!-- Navigation-->
            {% include '/common/topnav.html' %}
            <!-- Page Content-->
            <div class="container px-5 my-5">
                <div class="text-center mb-5">
                    <h1 class="display-5 fw-bolder mb-0"><span class="text-gradient d-inline">신규회원 등록</span></h1>
                </div>
                <div class="row gx-5 justify-content-center">
                    <div class="col-lg-11 col-xl-9 col-xxl-8">
                        <!-- action 주소 끝에 슬래시(/) 추가 -->
                        <form method="POST" id="editor-form" action="/member_insert/">
                        <table class="table table-bordered text-center">
                            <thead>
                            </thead>
                            <tbody>
                                <tr>
                                    <td> 회원명 </td>
                                    <td><input class="form-control" id="membername" name="membername" type="text" required value=""></td>
                                </tr>
                                <tr>
                                    <td> 직책 </td>
                                    <td><select class="form-control selectpicker" data-live-search ="true" id="memberrank" name="memberrank">
                                        {% for rnk in ranks %}
                                        <option value="{{ rnk[0] }}">{{ rnk[1] }}</option>
                                        {% endfor %}
                                    </select></td>
                                </tr>
                                <tr>
                                    <td> 소속클럽 </td>
                                    <td>
                                        <select class="form-control selectpicker" data-live-search="true" id="memberclub" name="memberclub" required>
                                            <option value="">클럽선택</option>
                                                {% for sp in clubs %}
                                                {% if sp.clubNo|int != 0 %}
                                                       <option value="{{ sp.clubNo }}" {% if club_id and sp.clubNo|string == club_id|string %}selected{% endif %}>{{ sp.clubName }}</option>
                                                {% endif %}
                                                {% endfor %}
                                        </select>
                                    </td>
                                </tr>
                                <tr>
                                    <td colspan="2">
                                        <div class="col-12"
                                             style="display: flex; justify-content: space-between; gap: 10px;">
                                            <a href="#" onclick="window.location.href='/manage_cmembers'; return false;"
                                                class="btn btn-dark"
                                               role="button" style="flex: 0 0 30%;">회원 목록으로 돌아가기</a>
                                            <button type="submit" class="btn btn-primary" style="flex: 0 0 50%;">신규회원등록
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <!-- Footer-->
        {% include '/common/footer.html' %}
        {% include '/common/adscript.html' %}
        <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/js/bootstrap-select.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/css/bootstrap-select.min.css">

        <script>
            $(document).ready(function () {
                // selectpicker 초기화
                $('.selectpicker').selectpicker({
                    style: 'btn-inverse',
                    size: 20
                });

                $('#editor-form').on('submit', async function(event) {
                    event.preventDefault();
                    const form = this;
                    const formData = new FormData(form);
                    try {
                        const response = await fetch(form.action, {
                            method: 'POST',
                            body: formData
                        });
                        if (response.ok) {
                            const result = await response.json();
                            alert(result.message);

                            if (result.redirect_url) {
                                window.location.href = result.redirect_url;
                            } else {
                                window.history.back();
                            }
                        } else {
                            alert("서버 오류가 발생했습니다. 다시 시도해주세요.");
                        }
                    } catch (error) {
                        console.error("Error:", error);
                        alert("알 수 없는 오류가 발생했습니다.");
                    }
                });
            });
        </script>
    </body>
</html>
