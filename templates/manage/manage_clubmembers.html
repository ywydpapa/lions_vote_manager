<!DOCTYPE html>
<html lang="en">
    <head>
        {% include '/common/header.html' %}
    </head>
    <body class="d-flex flex-column h-100 bg-light">
        <main class="flex-shrink-0">
            <!-- Navigation-->
            {% include '/common/topnav.html' %}
            <!-- Page Content-->
            <div class="container px-5 my-5">
                <div class="text-center mb-5">
                    <h1 class="display-5 fw-bolder mb-0"><span class="text-gradient d-inline">클럽별 등록회원 목록</span></h1>
                </div>
                <div class="row gx-5 justify-content-center">
                    <div class="col-lg-11 col-xl-9 col-xxl-10">
                        <div class="d-flex justify-content-end align-items-center mb-3 gap-2">
                            <a href="/new_member" id="newMemberBtn" class="btn btn-primary shadow-sm fw-bold">
                                + 새 회원 등록
                            </a>
                            <select class="form-select w-auto shadow-sm border-0 selectpicker" data-live-search="true" id="clubSelect" name="clubSelect" aria-label="클럽 선택">
                                <option value="">클럽을 선택하세요</option>
                                {% for club in clubs %}
                                {% if club[0]|int != 0 %}
                                <!-- clubno와 일치하면 selected 속성 추가 -->
                                <option value="{{ club[0] }}" {% if clubno and club[0]|string == clubno|string %}selected{% endif %}>{{ club[1] }}</option>
                                {% endif %}
                                {% endfor %}
                            </select>
                        </div>
                        <!-- 데이터 테이블 -->
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover text-center align-middle bg-white shadow-sm" id="memberTable">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" style="width: 10%;">순번</th>
                                        <th scope="col" style="width: 10%;">회원번호</th>
                                        <th scope="col" style="width: 40%;">직책</th>
                                        <th scope="col" style="width: 40%;">성명</th>
                                    </tr>
                                </thead>
                                <tbody>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>
            </div>
        </main>
        <!-- Footer-->
        {% include '/common/footer.html' %}
        {% include '/common/adscript.html' %}
        {% include '/common/adscripttable.html' %}

        <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/js/bootstrap-select.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/css/bootstrap-select.min.css">

        <script>
    $(document).ready(function () {
        // 1. DataTables 초기화 (tbody가 비어있으므로 에러가 발생하지 않습니다)
        const table = $('#memberTable').DataTable({
            "pageLength": 20,
            "language": {
                "emptyTable": "클럽을 선택해주세요." // 기본 빈 테이블 메시지
            }
        });

        $('.selectpicker').selectpicker({
            style: 'btn-inverse',
            size: 20
        });

        // 클럽 선택 변경 이벤트
        $('#clubSelect').on('change', async function () {
            const clubNo = $(this).val();
            const newBtn = $('#newMemberBtn');

            // 새 회원 등록 버튼 링크 업데이트
            if (clubNo) {
                newBtn.attr('href', `/new_member?club_id=${clubNo}`);
            } else {
                newBtn.attr('href', '/new_member');
            }

            // 클럽 선택이 해제되었을 때
            if (!clubNo) {
                table.clear();
                // 빈 메시지 변경 후 다시 그리기
                table.settings()[0].oLanguage.sEmptyTable = "클럽을 선택해주세요.";
                table.draw();
                return;
            }

            // 로딩 스피너 표시
            table.clear();
            table.settings()[0].oLanguage.sEmptyTable = '<div class="spinner-border text-primary" role="status"></div><div class="mt-2">데이터를 불러오는 중...</div>';
            table.draw();

            try {
                // 백엔드 API 호출
                const response = await fetch(`/api/clubmembers/${clubNo}`);
                if (!response.ok) throw new Error('데이터를 불러오는데 실패했습니다.');

                const members = await response.json();

                table.clear(); // 데이터 넣기 전 초기화

                if (members.length === 0) {
                    table.settings()[0].oLanguage.sEmptyTable = "해당 클럽에 등록된 회원이 없습니다.";
                    table.draw();
                    return;
                }

                // DataTables API를 사용하여 데이터 추가
                members.forEach((member, index) => {
                    table.row.add([
                        index + 1,
                        member.memberNo,
                        member.rankTitlekor,
                        `<a href="/edit_member/${member.memberNo}?club_id=${member.clubNo}">${member.memberName}</a>`
                    ]);
                });

                // 데이터 추가 완료 후 테이블 다시 그리기
                table.draw();

            } catch (error) {
                console.error('Error:', error);
                table.clear();
                table.settings()[0].oLanguage.sEmptyTable = '<span class="text-danger">데이터를 불러오는 중 오류가 발생했습니다.</span>';
                table.draw();
            }
        });

        // 페이지 로드 시 선택된 클럽이 있다면 자동으로 change 이벤트 발생시켜 데이터 로드
        if ($('#clubSelect').val()) {
            $('#clubSelect').trigger('change');
        }
    });
</script>


    </body>
</html>
