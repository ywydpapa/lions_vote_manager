<!DOCTYPE html>
<html lang="ko">
    <head>
        {% include '/common/header.html' %}
        <style>
            /* 카드 내 이미지 슬라이더 맞춤 설정 */
            .carousel-inner, .carousel-item {
                height: 100%;
                min-height: 300px; /* 모바일 등에서 최소 높이 보장 */
            }
            .carousel-item img {
                height: 100%;
                width: 100%;
                object-fit: cover; /* 이미지가 찌그러지지 않고 영역을 꽉 채우도록 설정 */
            }
            /* 좌측 텍스트 영역 수직 중앙 정렬 및 여백 */
            .text-section {
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: 3rem;
            }
            @media (max-width: 768px) {
                .text-section {
                    padding: 2rem;
                }
            }
        </style>
    </head>
    <body class="d-flex flex-column h-100 bg-light">
        <main class="flex-shrink-0">
            <!-- Navigation-->
            {% include '/common/topnav.html' %}

            <!-- Projects Section-->
            <section class="py-5">
                <div class="container px-5 mb-5">
                    <div class="text-center mb-5">
                        <h1 class="display-5 fw-bolder mb-0"><span class="text-gradient d-inline">후보의 발자취</span></h1>
                    </div>
                    <div class="row gx-5 justify-content-center">
                        <div class="col-lg-11 col-xl-10 col-xxl-9">

                            <!-- Project Card 1-->
                            <div class="card overflow-hidden shadow rounded-4 border-0 mb-5">
                                <div class="row g-0 h-100">
                                    <!-- 좌측 텍스트 영역 (약 30~33%) -->
                                    <div class="col-md-4 text-section bg-white">
                                        <h2 class="fw-bolder mb-3">회장/자문회</h2>
                                        <p class="text-muted mb-0">
                                            자문회 활동 내역입니다. 여기에 후보님의 상세한 활동 내용이나 설명을 여러 줄로 작성하실 수 있습니다.
                                        </p>
                                    </div>

                                    <!-- 우측 이미지 슬라이더 영역 (약 67~70%) -->
                                    <div class="col-md-8">
                                        <!-- 고유한 id(carouselProject1)를 지정해야 슬라이드가 정상 작동합니다 -->
                                        <div id="carouselProject1" class="carousel slide h-100" data-bs-ride="carousel">
                                            <!-- 슬라이드 하단 인디케이터 (점) -->
                                            <div class="carousel-indicators">
                                                <button type="button" data-bs-target="#carouselProject1" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                                                <button type="button" data-bs-target="#carouselProject1" data-bs-slide-to="1" aria-label="Slide 2"></button>
                                                <button type="button" data-bs-target="#carouselProject1" data-bs-slide-to="2" aria-label="Slide 3"></button>
                                            </div>

                                            <!-- 슬라이드 이미지들 -->
                                            <div class="carousel-inner">
                                                <div class="carousel-item active">
                                                    <img src="https://dummyimage.com/800x500/343a40/6c757d" alt="활동 사진 1" />
                                                </div>
                                                <div class="carousel-item">
                                                    <img src="https://dummyimage.com/800x500/5c2a8a/ffffff" alt="활동 사진 2" />
                                                </div>
                                                <div class="carousel-item">
                                                    <img src="https://dummyimage.com/800x500/c5a059/ffffff" alt="활동 사진 3" />
                                                </div>
                                            </div>

                                            <!-- 좌우 이동 버튼 -->
                                            <button class="carousel-control-prev" type="button" data-bs-target="#carouselProject1" data-bs-slide="prev">
                                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                                <span class="visually-hidden">이전</span>
                                            </button>
                                            <button class="carousel-control-next" type="button" data-bs-target="#carouselProject1" data-bs-slide="next">
                                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                                <span class="visually-hidden">다음</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- End Project Card 1 -->

                        </div>
                    </div>
                </div>
            </section>

            <!-- Call to action section-->
            <section class="py-5 bg-gradient-primary-to-secondary text-white">
                <div class="container px-5 my-5">
                    <div class="text-center">
                        <h2 class="display-4 fw-bolder mb-4">Let's build something together</h2>
                        <a class="btn btn-outline-light btn-lg px-5 py-3 fs-6 fw-bolder" href="/contact">Contact me</a>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer-->
        {% include '/common/footer.html' %}
        {% include '/common/adscript.html' %}
    </body>
</html>
